<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragmentos/layout :: cabeceraComun('Nuestras Categorías')}">
</head>

<body class="d-flex flex-column h-100">

<nav th:replace="~{/fragmentos/layout :: navbar}"></nav>

<main class="container my-5 flex-shrink-0">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">Nuestras Categorías</h1>
        <p class="text-muted">Explora la selección exclusiva de Kairos Luxe</p>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">

        <div th:each="cat : ${categorias}" class="col">
            <div class="card h-100 shadow-sm border-0 transition-hover">

                <div class="text-center p-3">
                    <img th:src="@{/imagenes/categorias/{img}(img=${cat.imagen != null ? cat.imagen : 'no-image.jpg'})}"
                         class="card-img-top rounded"
                         alt="Reloj"
                         style="height: 200px; object-fit: cover;">
                </div>

                <div class="card-body text-center">
                    <h3 class="card-title h5 fw-bold text-uppercase" th:text="${cat.nombre}">Nombre</h3>
                    <p class="card-text text-secondary small" th:text="${cat.descripcion}">Descripción</p>
                </div>

                <div class="card-footer bg-transparent border-0 pb-4 text-center">
                    <a th:href="@{/categorias/{id}(id=${cat.id})}" class="btn btn-outline-dark px-4">
                        Ver más
                    </a>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{/fragmentos/layout :: footer}"></footer>

<!-- Scripts Bootstrap -->
<div th:replace="~{fragmentos/layout :: scriptsComunes}"></div>
</body>
</html>
