spring.application.name=Web
server.port=8080

# Prueba de cambio de ruta (descomenta para probar contexto)
### server.servlet.context-path=/shop
### server.servlet.context-path=/tienda

# ?? H2 ? Cadena de conexiÛn
spring.datasource.url=jdbc:h2:mem:shop;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ?? JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? Consola web H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? InicializaciÛn de datos
# Necesario para que data.sql se ejecute DESPU…S de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always