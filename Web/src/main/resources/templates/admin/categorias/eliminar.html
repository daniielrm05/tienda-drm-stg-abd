<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Borrado - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragmentos/admin/nav :: navbarAdmin}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-5 text-center">
                    <!-- Icono de advertencia visual -->
                    <i class="bi bi-exclamation-octagon text-danger display-1 mb-4"></i>

                    <h1 class="h3 mb-3">¿Confirmar eliminación?</h1>

                    <!-- Pregunta con el tipo y nombre del elemento -->
                    <p class="lead mb-4">
                        ¿Seguro que desea borrar la categoría <strong th:text="${categoria.nombre}">Nombre Categoría</strong>?
                    </p>

                    <!-- Bloque para mostrar errores si el borrado falla (Requisito 3.5 Alumno C) -->
                    <div th:if="${error}" class="alert alert-danger mb-4" role="alert">
                        <i class="bi bi-x-circle-fill me-2"></i>
                        <span th:text="${error}">Error al intentar eliminar.</span>
                    </div>

                    <form th:action="@{/admin/categorias/{id}/delete(id=${categoria.id})}" method="post">
                        <div class="d-grid gap-2 d-md-block">
                            <!-- Botón Aceptar: Ejecuta la acción (Requisito 3.5) -->
                            <button type="submit" class="btn btn-danger btn-lg px-5 me-md-2">
                                <i class="bi bi-trash me-1"></i> Aceptar
                            </button>

                            <!-- Botón Cancelar: Vuelve al listado (Requisito 3.5) -->
                            <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary btn-lg px-5">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4 text-muted">
                <small><i class="bi bi-info-circle me-1"></i> Esta acción no se puede deshacer si la categoría no tiene relojes asociados.</small>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
