<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/fragmentos/layout :: cabeceraComun(${reloj.nombre})}">
</head>

<body class="d-flex flex-column h-100">

<nav th:replace="~{/fragmentos/layout :: navbar}"></nav>

<main class="container my-5 flex-shrink-0">
    <!-- Botón Volver -->
    <div class="mb-4">
        <a th:href="@{/relojes}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Volver al catálogo
        </a>
    </div>

    <div class="row g-5">
        <!-- Columna Izquierda: Imagen Grande -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-3">
                <img th:src="${reloj.imagen != null ? reloj.imagen : '/imagenes/relojes/no-image.jpg'}"
                     class="img-fluid rounded"
                     th:alt="'Imagen de ' + ${reloj.nombre}"
                     style="max-height: 500px; object-fit: contain;">
            </div>
        </div>

        <!-- Columna Derecha: Información -->
        <div class="col-md-6">
            <div class="ps-md-3">
                <!-- Marca y Badge de Descuento -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <a class="text-uppercase text-muted fw-bold" th:href="@{/marcas/{id}(id=${reloj.marca.id})}" th:text="${reloj.marca.nombre}">Nombre Marca</a>
                    <span th:if="${reloj.descuento > 0}" class="badge bg-danger p-2"
                          th:text="${reloj.descuento} + '% de descuento'">%</span>
                </div>

                <h1 class="display-5 fw-bold mb-3" th:text="${reloj.nombre}">Nombre del Reloj</h1>

                <!-- Precios -->
                <div class="mb-4">
                    <div th:if="${reloj.descuento > 0}">
                        <span class="h2 fw-bold text-dark"
                              th:text="${#numbers.formatDecimal(reloj.precio * (1 - reloj.descuento/100.0), 1, 2)} + '€'">
                        </span>
                        <span class="h5 text-decoration-line-through text-muted ms-3"
                              th:text="${reloj.precio} + '€'">
                        </span>
                    </div>
                    <div th:unless="${reloj.descuento > 0}">
                        <span class="h2 fw-bold text-dark" th:text="${reloj.precio} + '€'"></span>
                    </div>
                </div>

                <hr class="my-4">

                <!-- Detalles Técnicos -->
                <div class="mb-4">
                    <h5 class="fw-bold">Especificaciones</h5>
                    <ul class="list-unstyled mt-3">
                        <li class="mb-2"><strong>EAN-13:</strong> <span th:text="${reloj.codigo}">0000000000000</span></li>
                        <li class="mb-2"><strong>Categorías:</strong>
                            <span th:each="cat, iter : ${reloj.categorias}">
                                <a th:href="@{/categorias/{id}(id=${cat.id})}"
                                   class="badge bg-light text-dark text-decoration-none border"
                                   th:text="${cat.nombre}">Categoría</a>
                                <span th:if="${!iter.last}"> </span>
                            </span>
                        </li>
                    </ul>
                </div>

                <!-- Descripción Completa (Sin abreviar) -->
                <div class="mb-5">
                    <h5 class="fw-bold">Descripción</h5>
                    <p class="text-secondary lh-lg" th:text="${reloj.descripcion}">
                        Aquí va la descripción larga que metiste en el data.sql.
                    </p>
                </div>

                <!-- Botón de compra (Simulado) -->
                <button class="btn btn-dark btn-lg w-100 py-3 shadow">
                    Añadir al carrito
                </button>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{/fragmentos/layout :: footer}"></footer>

<div th:replace="~{fragmentos/layout :: scriptsComunes}"></div>
</body>
</html>
