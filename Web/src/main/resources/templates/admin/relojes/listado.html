<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Relojes - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragmentos/admin/nav :: navbarAdmin}"></div>

<main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 fw-bold">Gestión de Relojes</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
                    <li class="breadcrumb-item active">Relojes</li>
                </ol>
            </nav>
        </div>
        <!-- Enlace para crear nuevo reloj -->
        <a th:href="@{/templates/admin/relojes/new}" class="btn btn-dark">
            <i class="bi bi-plus-circle me-1"></i> Añadir Reloj
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Código EAN</th>
                        <th>Nombre</th>
                        <th>Marca</th>
                        <th>Precio</th>
                        <th class="text-end pe-4">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="reloj : ${relojes}">
                        <td class="ps-4 text-monospace" th:text="${reloj.codigoEan}">1234567890123</td>
                        <td th:text="${reloj.nombre}">Reloj Elegante</td>
                        <!-- Mostramos el nombre de la marca relacionada -->
                        <td>
                            <span class="badge bg-secondary" th:text="${reloj.marca.nombre}">Marca</span>
                        </td>
                        <td th:text="${#numbers.formatDecimal(reloj.precio, 1, 2) + '€'}">99.99€</td>
                        <td class="text-end pe-4">
                            <a th:href="@{/templates/admin/relojes/{id}/edit(id=${reloj.id})}"
                               class="btn btn-sm btn-outline-warning me-2" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/templates/admin/relojes/{id}/delete(id=${reloj.id})}"
                               class="btn btn-sm btn-outline-danger" title="Borrar">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
