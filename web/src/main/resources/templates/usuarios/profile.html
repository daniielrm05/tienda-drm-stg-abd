<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/layout :: cabeceraComun('Mi Perfil')}"></head>

<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragmentos/layout :: navbar}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pt-4">
                    <h2 class="text-center font-playfair">Mi Perfil</h2>
                </div>
                <div class="card-body p-4">
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted">Nombre de usuario:</div>
                        <div class="col-sm-8 fw-bold" th:text="${#authentication.name}">NombreUser</div>
                    </div>
                    <hr class="text-muted opacity-25">

                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted">Email:</div>
                        <div class="col-sm-8" th:text="${usuario.email}">ejemplo@correo.com</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted">Nombre completo:</div>
                        <div class="col-sm-8" th:text="${usuario.nombre + ' ' + usuario.apellidos}">Nombre Apellidos</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-4 text-muted">Roles asignados:</div>
                        <div class="col-sm-8">
                            <span th:each="rol : ${usuario.roles}"
                                  class="badge bg-info text-dark me-1"
                                  th:text="${rol.id}">ROLE_USER</span>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a th:href="@{/}" class="btn btn-outline-secondary">Volver a la tienda</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragmentos/layout :: footer}"></footer>
</body>
</html>
