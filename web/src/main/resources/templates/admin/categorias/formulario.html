<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${categoria.id == null} ? 'Nueva Categoría' : 'Editar Categoría'">Formulario Categoría</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragmentos/admin/nav :: navbarAdmin}"></div>

<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white p-3">
          <h2 class="h5 mb-0" th:text="${categoria.id == null} ? 'Crear Categoría' : 'Modificar Categoría'">Gestión</h2>
        </div>
        <div class="card-body p-4">

          <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

          <form th:action="@{/admin/categorias}" th:object="${categoria}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
              <label class="form-label fw-bold">Nombre</label>
              <input type="text" th:field="*{nombre}" class="form-control" required maxlength="100">
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Descripción (opcional)</label>
              <textarea th:field="*{descripcion}" class="form-control" rows="3" maxlength="2000"></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success px-4">Guardar</button>
              <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary px-4">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
